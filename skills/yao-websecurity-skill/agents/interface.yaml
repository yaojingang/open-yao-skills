interface:
  display_name: "Yao Websecurity Skill"
  short_description: "Audit authorized web systems in static or dynamic modes and export Chinese XLSX, HTML, Markdown, and PDF reports"
  default_prompt: "Use $yao-websecurity-skill for this local path, GitHub repo, staging URL, or owned runtime. Confirm mode and authorization, prepare an isolated temp workdir, inspect code/config/runtime as allowed, check V001-V275, score items, and export Chinese XLSX/HTML/Markdown/PDF reports."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
