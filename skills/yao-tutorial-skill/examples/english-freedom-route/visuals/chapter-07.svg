  <circle cx="512.0" cy="260.0" r="15" fill="#1f4e79"/>
  <text x="512.0" y="265.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="512.0" dy="0">2</tspan></text>
  <text x="538.0" y="265.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="538.0" dy="0">全球内容</tspan></text>
  <text x="508.0" y="290.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="508.0" dy="0">素材层</tspan></text>
  <rect x="812.0" y="260.0" width="204.0" height="86.0" rx="8" fill="#fbfaf6" stroke="#d9d4c8" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="838.0" cy="288.0" r="15" fill="#1f4e79"/>
