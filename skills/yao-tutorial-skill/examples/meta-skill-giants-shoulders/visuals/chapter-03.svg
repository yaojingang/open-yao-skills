<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="标杆拆解六层栈" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#e8e4da" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1f4e79" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f5f4ed"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#f5f4ed" stroke="#d9d6cc" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1f4e79" font-size="12" font-weight="800" letter-spacing="1.2">第3章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5f6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1f4e79"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">标杆拆解六层栈</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5f6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">不要只看表面功能，要看结构、流程、交互、记忆、评估和迭代机制。</tspan></text>
  <text x="168" y="222" fill="#5f6673" font-size="12" font-weight="700">越往下越接近底层机制，越往上越接近用户可见结果</text>
  <rect x="168.0" y="236.0" width="864.0" height="45.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="168.0" y="236.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="198.0" y="265.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="198.0" dy="0">结构</tspan></text>
  <text x="1008.0" y="263.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="1008.0" dy="0">文件和边界</tspan></text>
  <rect x="196.0" y="293.0" width="808.0" height="45.0" rx="8" fill="#f7f5ee" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="196.0" y="293.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="226.0" y="322.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="226.0" dy="0">流程</tspan></text>
  <text x="980.0" y="320.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="980.0" dy="0">执行顺序</tspan></text>
  <rect x="224.0" y="350.0" width="752.0" height="45.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="224.0" y="350.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="254.0" y="379.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="254.0" dy="0">交互</tspan></text>
  <text x="952.0" y="377.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="952.0" dy="0">何时提问</tspan></text>
  <rect x="252.0" y="407.0" width="696.0" height="45.0" rx="8" fill="#f7f5ee" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="252.0" y="407.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="282.0" y="436.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="282.0" dy="0">记忆</tspan></text>
  <text x="924.0" y="434.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="924.0" dy="0">上下文组织</tspan></text>
  <rect x="280.0" y="464.0" width="640.0" height="45.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="280.0" y="464.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="310.0" y="493.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="310.0" dy="0">评估</tspan></text>
  <text x="896.0" y="491.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="896.0" dy="0">怎么判断好坏</tspan></text>
  <rect x="308.0" y="521.0" width="584.0" height="45.0" rx="8" fill="#f7f5ee" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="308.0" y="521.0" width="7" height="45.0" rx="3.5" fill="#1f4e79"/>
  <text x="338.0" y="550.5" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="338.0" dy="0">迭代</tspan></text>
  <text x="868.0" y="548.5" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="868.0" dy="0">如何变得更好</tspan></text>
</svg>
