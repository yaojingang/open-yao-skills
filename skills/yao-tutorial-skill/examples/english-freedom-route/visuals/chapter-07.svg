  <text x="864.0" y="293.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="864.0" dy="0">问题定义</tspan></text>
  <text x="834.0" y="318.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="834.0" dy="0">判断层</tspan></text>
  <rect x="930.0" y="470.0" width="204.0" height="86.0" rx="8" fill="#fbfaf6" stroke="#d9d4c8" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="956.0" cy="498.0" r="15" fill="#1f4e79"/>
  <text x="956.0" y="503.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="956.0" dy="0">4</tspan></text>
  <text x="982.0" y="503.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="982.0" dy="0">资源调度</tspan></text>
  <text x="952.0" y="528.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="952.0" dy="0">行动层</tspan></text>
  <rect x="540.0" y="512.0" width="204.0" height="86.0" rx="8" fill="#fbfaf6" stroke="#d9d4c8" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="566.0" cy="540.0" r="15" fill="#1f4e79"/>
  <text x="566.0" y="545.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="566.0" dy="0">5</tspan></text>
  <text x="592.0" y="545.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="592.0" dy="0">复盘迭代</tspan></text>
  <text x="562.0" y="570.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="562.0" dy="0">成长层</tspan></text>
  <rect x="226.0" y="470.0" width="204.0" height="86.0" rx="8" fill="#fbfaf6" stroke="#d9d4c8" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="252.0" cy="498.0" r="15" fill="#1f4e79"/>
  <text x="252.0" y="503.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="252.0" dy="0">6</tspan></text>
  <text x="278.0" y="503.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="278.0" dy="0">判断位</tspan></text>
  <text x="248.0" y="528.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="248.0" dy="0">长期上限</tspan></text>
