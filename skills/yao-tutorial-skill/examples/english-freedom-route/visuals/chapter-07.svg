<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="从英语自由到判断位" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#e7e1d6" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1f4e79" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f5f3ec"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#fbfaf6" stroke="#d9d4c8" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#f5f3ec" stroke="#d9d4c8" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1f4e79" font-size="12" font-weight="800" letter-spacing="1.2">第7章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5f6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1f4e79"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">从英语自由到判断位</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5f6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">把语言能力接到内容选择、问题定义、资源调度和行动复盘。</tspan></text>
  <rect x="184.0" y="260.0" width="204.0" height="86.0" rx="8" fill="#f7f4ec" stroke="#1f4e79" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="184.0" y="260.0" width="204.0" height="5" rx="2.5" fill="#1f4e79"/>
  <circle cx="210.0" cy="288.0" r="15" fill="#1f4e79"/>
  <text x="210.0" y="293.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="210.0" dy="0">1</tspan></text>
  <text x="236.0" y="293.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="236.0" dy="0">英语自由</tspan></text>
  <text x="206.0" y="318.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="206.0" dy="0">入口层</tspan></text>
