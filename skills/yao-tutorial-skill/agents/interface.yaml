interface:
  display_name: "Yao Tutorial Skill"
  short_description: "Research any topic and build a polished beginner tutorial with chapter visuals and DOCX/PDF/HTML exports"
  default_prompt: "Use $yao-tutorial-skill to turn my topic and supplied notes, URLs, files, papers, repos, or style references into a source-backed beginner tutorial with chapter visuals, 第1章/1.1 headings, centered HTML report, Word/PDF/HTML exports, and package validation."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
